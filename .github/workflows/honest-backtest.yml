name: Honest Backtest (Anti-Survivorship)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 0'  # Sundays 10:30 AM IST
  push:
    paths:
      - 'honest_backtest.py'
      - 'cost_history.json'
      - '.github/workflows/honest-backtest.yml'

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install "yfinance>=0.2.40" pandas numpy curl_cffi
      - run: python honest_backtest.py
      - name: Commit results
        run: |
          git config user.name "PMS Honest Bot"
          git config user.email "bot@github.com"
          git add backtest_honest.json
          git diff --staged --quiet || git commit -m "Honest backtest $(date -u +%Y-%m-%d)"
          git push
