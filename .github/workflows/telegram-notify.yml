name: Telegram Notify

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Daily PMS Algo"
      - "Enrich Backtests with Nifty MoM"
    types:
      - completed
  schedule:
    - cron: '30 4 * * 1-5'   # 10:00 AM IST - morning update
    - cron: '0 10 * * 1-5'   # 3:30 PM IST - EOD clean summary

permissions:
  contents: read

jobs:
  morning-notify:
    if: github.event.schedule == '30 4 * * 1-5' || github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python telegram_notify.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  
  eod-summary:
    if: github.event.schedule == '0 10 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python telegram_notify.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EOD_MODE: "1"
