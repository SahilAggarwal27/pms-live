name: 25-Year Backtest

on:
  workflow_dispatch:
  
  schedule:
    - cron: '0 3 1 * *'  # 1st of every month at 8:30 AM IST
  
  push:
    paths:
      - 'backtest.py'
      - '.github/workflows/backtest.yml'

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install "yfinance>=0.2.40" pandas numpy curl_cffi
      - run: python backtest.py
      - name: Commit results
        run: |
          git config user.name "PMS Backtest Bot"
          git config user.email "bot@github.com"
          git add backtest_data.json
          git diff --staged --quiet || git commit -m "Backtest $(date -u +%Y-%m-%d)"
          git push
